<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layered Up — TikTok Authorization</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1a1a2e; border-radius: 16px; padding: 40px; max-width: 600px; text-align: center; border: 1px solid rgba(0,229,255,0.2); }
        h1 { color: #00E5FF; margin-bottom: 20px; }
        .code-box { background: #0d0d0d; border: 2px solid #00E5FF; border-radius: 8px; padding: 20px; margin: 20px 0; word-break: break-all; font-family: monospace; font-size: 1.1em; color: #00E5FF; cursor: pointer; }
        .code-box:hover { background: #1a1a1a; }
        .success { color: #4CAF50; font-size: 1.2em; }
        .error { color: #f44336; }
        .instructions { color: #aaa; line-height: 1.6; margin-top: 20px; }
        button { background: #00E5FF; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1em; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background: #00bcd4; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🖨️ Layered Up</h1>
        <div id="content">
            <p>Processing authorization...</p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');
        const content = document.getElementById('content');

        if (error) {
            content.innerHTML = `
                <p class="error">❌ Authorization failed: ${error}</p>
                <p class="instructions">Please try again or contact support.</p>
            `;
        } else if (code) {
            content.innerHTML = `
                <p class="success">✅ Authorization successful!</p>
                <p>Your authorization code:</p>
                <div class="code-box" onclick="copyCode()" id="codeBox">${code}</div>
                <button onclick="copyCode()">📋 Copy Code</button>
                <p class="instructions">
                    Copy this code and paste it in Discord.<br>
                    Clawd will exchange it for an access token automatically.
                </p>
                <p id="copied" style="color: #4CAF50; display: none; margin-top: 10px;">✅ Copied!</p>
            `;
        } else {
            content.innerHTML = `
                <p class="error">No authorization code received.</p>
                <p class="instructions">This page should be reached via TikTok's OAuth redirect.</p>
            `;
        }

        function copyCode() {
            navigator.clipboard.writeText('${code || ""}').then(() => {
                document.getElementById('copied').style.display = 'block';
            });
        }
    </script>
</body>
</html>
